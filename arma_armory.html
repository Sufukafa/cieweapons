    <meta name="keywords"
        content="Arma Reforger, CIE, Weapon Database, Armory, зброя, база даних, характеристики зброї, боєприпаси, гайд, qCold">
    <meta name="author" content="qCold">

    <title>CIE Weapon Database</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(15, 23, 42, 0.55);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #d97706;
            --accent-hover: #f59e0b;
            --danger: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background: url('https://i.imgur.com/k5sd2lE.jpg') no-repeat center center fixed;
            background-size: cover;
            color: var(--text-main);
            min-height: 100vh;
            padding: 2rem;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.75);
            z-index: -1;
        }

        .page-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .layout {
            display: flex;
            gap: 2rem;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 1.5rem;
            height: fit-content;
            position: sticky;
            top: 2rem;
        }

        .sidebar h3 {
            margin-bottom: 1rem;
            color: var(--accent);
            text-transform: uppercase;
            font-size: 1rem;
            letter-spacing: 1px;
            border-bottom: 1px solid var(--card-border);
            padding-bottom: 0.5rem;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.75rem;
            cursor: pointer;
            font-size: 1rem;
            color: var(--text-main);
            transition: color 0.2s;
        }

        .filter-label:hover {
            color: var(--accent);
        }

        .filter-checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--accent);
            cursor: pointer;
        }

        .content {
            flex-grow: 1;
            min-width: 0;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--accent);
            font-size: 1.5rem;
            font-weight: 600;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
        }

        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            padding: 1rem;
            border-radius: 16px;
            margin-bottom: 2rem;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
        }

        .tab-btn {
            background: transparent;
            color: var(--text-muted);
            border: 1px solid transparent;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .tab-btn:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .tab-btn.active {
            color: #fff;
            background: var(--accent);
            border-color: var(--accent-hover);
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.5);
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--card-border);
            color: var(--text-main);
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(217, 119, 6, 0.3);
        }

        .search-icon {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        .table-container {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: none;
        }

        .table-container.active {
            display: block;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            table-layout: auto;
        }

        th,
        td {
            padding: 0.8rem 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        th {
            background: rgba(255, 255, 255, 0.03);
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 0.05em;
        }

        th.sortable {
            cursor: pointer;
            user-select: none;
            transition: color 0.2s;
            white-space: nowrap;
        }

        th.sortable:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        .sort-icon::after {
            content: '\21C5';
            opacity: 0.4;
            font-size: 1.2em;
            vertical-align: middle;
            margin-left: 6px;
        }

        th.sorted-asc .sort-icon::after {
            content: '\2191';
            opacity: 1;
            color: var(--accent);
        }

        th.sorted-desc .sort-icon::after {
            content: '\2193';
            opacity: 1;
            color: var(--accent);
        }

        .name-cell {
            max-width: 280px;
            word-wrap: break-word;
            white-space: normal;
            line-height: 1.3;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        tbody tr:last-child td {
            border-bottom: none;
        }

        .badge {
            display: inline-block;
            padding: 0.35rem 0.75rem;
            border-radius: 999px;
            font-size: 0.8rem;
            font-weight: 700;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            white-space: nowrap;
        }

        .badge.cat-smg {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.2), rgba(5, 150, 105, 0.4));
            color: #6ee7b7;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .badge.cat-assault-rifle {
            background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(217, 119, 6, 0.4));
            color: #fcd34d;
            border: 1px solid rgba(245, 158, 11, 0.3);
        }

        .badge.cat-machine-gun {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.2), rgba(220, 38, 38, 0.4));
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .badge.cat-sniper-rifle {
            background: linear-gradient(135deg, rgba(139, 92, 246, 0.2), rgba(109, 40, 217, 0.4));
            color: #c4b5fd;
            border: 1px solid rgba(139, 92, 246, 0.3);
        }

        .badge.cat-shotgun {
            background: linear-gradient(135deg, rgba(234, 179, 8, 0.2), rgba(202, 138, 4, 0.4));
            color: #fef08a;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        .badge.ap {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .badge.sub {
            background: rgba(148, 163, 184, 0.2);
            color: #cbd5e1;
        }

        .badge.fast {
            background: rgba(16, 185, 129, 0.2);
            color: #6ee7b7;
        }

        @media (max-width: 900px) {
            .layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                position: static;
                margin-bottom: 1rem;
            }

            .controls {
                flex-direction: column;
                gap: 1rem;
            }

            .search-box {
                width: 100%;
            }

            body {
                padding: 1rem;
            }
        }


        .lang-switch {
            display: flex;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 4px;
            position: absolute;
            right: 0;
            top: 0;
            cursor: pointer;
            border: 1px solid var(--card-border);
        }

        .lang-option {
            padding: 4px 12px;
            border-radius: 16px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-muted);
            transition: 0.3s;
            user-select: none;
        }

        .lang-option.active {
            background: var(--accent);
            color: #0f172a;
        }

        .filter-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.02);
            margin-bottom: 6px;
        }

        .filter-label:hover {
            background: rgba(255, 255, 255, 0.08);
        }

        .filter-checkbox {
            appearance: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-muted);
            border-radius: 6px;
            outline: none;
            cursor: pointer;
            position: relative;
            transition: 0.2s;
            background: transparent;
        }

        .filter-checkbox:checked {
            background: var(--accent);
            border-color: var(--accent);
        }

        .filter-checkbox:checked::after {
            content: '✔';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #0f172a;
            font-size: 14px;
            font-weight: bold;
        }


        .notes-cell {
            display: flex;
            align-items: center;
        }

        .notes-cell .badge {
            order: 2;
            margin-left: auto;
        }
    </style>
